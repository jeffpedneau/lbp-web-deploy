<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" shape-rendering="crispEdges">
  <rect width="24" height="24" fill="white"/>

  <!-- Horizontal double lines -->
  <rect x="0" y="0"  width="24" height="1" fill="#A3A3A3"/>
  <rect x="0" y="2"  width="24" height="1" fill="#A3A3A3"/>
  <rect x="0" y="12" width="24" height="1" fill="#A3A3A3"/>
  <rect x="0" y="14" width="24" height="1" fill="#A3A3A3"/>

  <!-- Vertical double lines -->
  <rect x="0"  y="0" width="1" height="24" fill="#A3A3A3"/>
  <rect x="2"  y="0" width="1" height="24" fill="#A3A3A3"/>
  <rect x="12" y="0" width="1" height="24" fill="#A3A3A3"/>
  <rect x="14" y="0" width="1" height="24" fill="#A3A3A3"/>

  <!-- Corrected 1×1 intersection cutouts (centered between bars) -->
  <rect x="1"  y="2"  width="1" height="1" fill="white"/>
  <rect x="1"  y="14" width="1" height="1" fill="white"/>
  <rect x="13" y="2"  width="1" height="1" fill="white"/>
  <rect x="13" y="14" width="1" height="1" fill="white"/>

  <rect x="1"  y="0"  width="1" height="1" fill="white"/>
  <rect x="13" y="0"  width="1" height="1" fill="white"/>
  <rect x="1"  y="12" width="1" height="1" fill="white"/>
  <rect x="13" y="12" width="1" height="1" fill="white"/>

  <rect x="2"  y="1"  width="1" height="1" fill="white"/>
  <rect x="2"  y="13" width="1" height="1" fill="white"/>
  <rect x="14" y="1"  width="1" height="1" fill="white"/>
  <rect x="14" y="13" width="1" height="1" fill="white"/>

  <rect x="0"  y="1"  width="1" height="1" fill="white"/>
  <rect x="0"  y="13" width="1" height="1" fill="white"/>
  <rect x="12" y="1"  width="1" height="1" fill="white"/>
  <rect x="12" y="13" width="1" height="1" fill="white"/>

</svg>
